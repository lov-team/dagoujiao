<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#fff2dc" />
<title>大狗叫 / Dog Bark</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐶</text></svg>" />
<style>
  /* 全页面限定调色板：米白底 + 主色黄 + 次色灰（极少点缀色） */
  :root {
    --cream: #fff2dc;   /* 背景 · 米白 */
    --amber: #ffb400;   /* 主色 · 黄 */
    --gray:  #87837e;   /* 次要 · 灰 */
    --coral: #ff5a5f;   /* 点缀（少量） */
    --teal:  #16c2a3;   /* 点缀（少量） */
    --blue:  #3e7bfa;   /* 点缀（少量） */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--cream);
    color: var(--gray);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* 纯色背景（固定米白，canvas 未启动时的兜底色） */
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    isolation: isolate;
    background: var(--cream);
    --scene-unit: 200px;
  }

  /* 全屏特效画布（仿 Mikutap：特效铺满全屏、层层叠加） */
  #fx {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  /* 常驻作者署名：始终位于页面最前层。
     两行严格等宽；Created by 整体跟拍，MarkCup 每拍依次放大一个字母。 */
  #author-link {
    position: absolute;
    right: max(18px, env(safe-area-inset-right));
    bottom: max(16px, env(safe-area-inset-bottom));
    z-index: 30;
    padding: 10px 12px 11px;
    display: none;
    text-decoration: none;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform .22s ease;
  }
  .author-copy {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    width: 124px;
    gap: 5px;
  }
  .author-label,
  .author-name {
    width: 100%;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .author-label {
    color: rgba(255, 180, 0, .78);
    font: 600 9px/1 "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    letter-spacing: 0;
    text-transform: uppercase;
    white-space: nowrap;
    transform-origin: 50% 70%;
    transform:
      translateY(var(--author-lift, 0px))
      scale(var(--author-rhythm-scale, 1));
    transition: color .22s ease;
  }
  .author-name {
    width: calc(100% + 6px);
    margin-left: -3px;
    color: var(--amber);
    font: 700 20px/1.15 "Noto Serif SC", "Songti SC", SimSun, serif;
    letter-spacing: 0;
    white-space: nowrap;
    transition: color .22s ease;
  }
  /* JS 将两行拆成等距字符；仅 MarkCup 字母逐拍放大 */
  .author-letter {
    display: inline-block;
    transform-origin: 50% 72%;
    will-change: transform;
  }
  @media (hover: hover) {
    #author-link:hover { transform: translateY(-2px); }
    #author-link:hover .author-label,
    #author-link:hover .author-name { color: #d88f00; }
  }
  #author-link:focus-visible {
    outline: 2px solid rgba(62, 123, 250, .35);
    outline-offset: 2px;
  }

  /* 分区按钮闪光层：点击/滑过时分区短暂显示半透明白色再淡出 */
  #zoneflash {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }
  .zone-flash {
    position: absolute;
    background: #fff;
    border-radius: 2vmin;
    opacity: 0;
    animation: zoneFade .45s ease-out forwards;
  }
  @keyframes zoneFade {
    0%   { opacity: .45; }
    100% { opacity: 0; }
  }

  /* 点击文字：旧文字上浮淡出，最外层定位与内层抖动互不覆盖。 */
  #click-text-layer {
    position: absolute;
    inset: 0;
    z-index: 8;
    overflow: hidden;
    pointer-events: none;
  }
  .click-claude {
    position: absolute;
    transform: translate(-50%, -50%);
    animation: claudeTextFade .9s ease-out forwards;
  }
  .click-claude-float {
    display: block;
    animation: claudeTextRise .9s cubic-bezier(.16, .72, .28, 1) forwards;
  }
  .click-claude-copy {
    display: block;
    color: var(--coral);
    font: 900 clamp(22px, 4.2vmin, 42px)/1 "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    letter-spacing: .03em;
    white-space: nowrap;
    text-shadow: 0 3px 0 var(--amber), 0 9px 20px rgba(135, 131, 126, .3);
    transform-origin: 50% 58%;
    will-change: transform;
  }
  @keyframes claudeTextFade {
    0%, 62% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes claudeTextRise {
    from { transform: translateY(0); }
    to { transform: translateY(-72px); }
  }

  /* 大狗 */
  #dog {
    position: absolute;
    inset: 0;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    will-change: transform;
    transform-origin: 50% 62%;   /* 节拍压缩围绕狗身体中下部进行 */
  }
  #dog-inner {
    position: relative;
    width: var(--scene-unit);
    will-change: transform;   /* 叫弹簧跳由 JS 逐帧驱动（无 CSS transition，保证果断跟手） */
  }
  /* 长按果冻层：transform / 变红滤镜全部由 JS 逐帧驱动（Q弹 + 高频抖动） */
  #dog-jelly {
    position: relative;
    will-change: transform, filter;
  }
  #dog-inner img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 18px 40px rgba(135, 131, 126, .4));
  }
  /* 张嘴图叠在闭嘴图之上：下层始终不透明，只切换上层透明度，
     避免交叉淡化时两张图都半透明导致整体变透明 */
  #dog-open {
    position: absolute;
    left: 0; top: 0;
    opacity: 0;
    transition: opacity .08s linear;
  }
  #dog-inner.bark-image #dog-open { opacity: 1; }

  /* 每 20 次有效点击出现的 3 秒成片。横屏素材完整显示，竖屏设备用米白补边。 */
  #milestone-video-layer {
    position: fixed;
    inset: 0;
    z-index: 45;
    display: grid;
    place-items: center;
    visibility: hidden;
    opacity: 0;
    pointer-events: none;
    background: var(--cream);
    transition: opacity .12s linear, visibility .12s linear;
  }
  #milestone-video-layer.is-visible {
    visibility: visible;
    opacity: 1;
    pointer-events: auto;
  }
  #milestone-video {
    position: absolute;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: block;
    object-fit: contain;
    object-position: center center;
    background: var(--cream);
  }

  /* 顶部控制：互动时隐藏，闲置 2 秒后由 JS 淡入 */
  #top-controls {
    position: absolute;
    top: max(14px, env(safe-area-inset-top));
    left: max(14px, env(safe-area-inset-left));
    right: max(14px, env(safe-area-inset-right));
    z-index: 20;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    opacity: 0;
    transform: translateY(-8px);
    pointer-events: none;
    /* 投影放在容器上：按钮本体用了 clip-path 切角，box-shadow 会被一起裁掉，
       容器的 drop-shadow 才能贴合八边形轮廓 */
    filter: drop-shadow(0 6px 14px rgba(135, 131, 126, .22));
    transition: opacity .5s ease, transform .5s cubic-bezier(.2, .8, .2, 1);
  }
  #top-controls.is-visible {
    opacity: 1;
    transform: translateY(0);
  }
  #top-controls.is-revealing-fast {
    transition-duration: .2s;
  }
  .control-group {
    display: flex;
    gap: 8px;
  }
  /* 几何化切角按钮：八边形轮廓呼应全屏几何特效（hexagon / diamond 粒子）。
     按钮本体背景充当“描边色”，::before 用缩小一号的同款切角多边形铺底色，
     描边因此能严格贴合切角（普通 border 做不到），颜色用变量一键切换 */
  .control-button {
    --btn-edge: rgba(135, 131, 126, .72);   /* 描边色 */
    --btn-fill: rgba(255, 242, 220, .92);   /* 底色 */
    position: relative;
    min-width: 68px;
    min-height: 44px;
    padding: 8px 12px;
    border: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--gray);
    background: var(--btn-edge);
    clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px),
                       calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    font: 700 13px/1 "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    cursor: pointer;
    pointer-events: auto;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transform: scale(var(--rhythm-scale, 1));
    transition: color .2s ease, background .2s ease;
  }
  .control-button::before {
    content: "";
    position: absolute;
    inset: 2px;
    z-index: -1;
    background: var(--btn-fill);
    clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px),
                       calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
    transition: background .2s ease;
  }
  /* 律动缩放由 JS 使用 Web Audio 时钟逐帧写入，避免切换静音时相位重置 */
  .control-button:active { transform: scale(.94); }
  .control-button:focus-visible {
    outline: 3px solid rgba(62, 123, 250, .38);
    outline-offset: 2px;
  }
  /* 悬停描边变琥珀色（仅桌面端）；.is-muted 规则在更后面，静音态优先 */
  @media (hover: hover) {
    .control-button:hover { --btn-edge: rgba(255, 180, 0, .85); }
    #video-button:hover { --btn-fill: rgba(255, 180, 0, .18); }
  }
  .control-button svg {
    width: 20px;
    height: 20px;
    overflow: visible;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .control-button .mute-slash {
    opacity: 0;
    stroke: var(--coral);
    stroke-width: 2.6;
    transition: opacity .2s ease;
  }
  .control-button.is-muted {
    --btn-edge: rgba(255, 90, 95, .68);
    --btn-fill: rgba(255, 255, 255, .94);
    color: var(--coral);
  }
  .control-button.is-muted .mute-slash { opacity: 1; }
  #video-button {
    --btn-edge: rgba(255, 180, 0, .88);
    display: none;
    color: #765f41;
  }
  #github-button {
    --btn-edge: rgba(22, 194, 163, .78);
    color: #147e6a;
  }
  @media (max-width: 430px) {
    #top-controls {
      top: max(10px, env(safe-area-inset-top));
      left: max(10px, env(safe-area-inset-left));
      right: max(10px, env(safe-area-inset-right));
    }
    .control-button {
      min-width: 44px;
      padding-inline: 10px;
    }
    .control-button span { display: none; }
    #language-toggle .language-label { display: inline; }
    #author-link {
      right: max(10px, env(safe-area-inset-right));
      bottom: max(10px, env(safe-area-inset-bottom));
      min-width: 0;
      max-width: calc(100% - 20px);
      padding: 8px 9px 7px 12px;
    }
    .author-copy { width: 106px; }
    .author-name {
      width: calc(100% + 4px);
      margin-left: -2px;
      font-size: 15px;
    }
  }

  /* 首次进入欢迎广告 */
  #welcome-ad {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: grid;
    place-items: center;
    padding: 24px;
    background: rgba(255, 242, 220, .96);
    transition: opacity .45s ease, visibility .45s ease;
  }
  #welcome-ad.hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .welcome-card {
    position: relative;
    width: min(88vw, 520px);
    padding: clamp(34px, 7vmin, 64px) clamp(24px, 6vmin, 54px);
    text-align: center;
    background: rgba(255, 255, 255, .46);
    border: 2px solid rgba(255, 180, 0, .7);
    box-shadow: 0 24px 70px rgba(135, 131, 126, .18);
    clip-path: polygon(18px 0, calc(100% - 18px) 0, 100% 18px,
                       100% calc(100% - 18px), calc(100% - 18px) 100%,
                       18px 100%, 0 calc(100% - 18px), 0 18px);
  }
  .welcome-language-toggle {
    position: absolute;
    top: 14px;
    right: 14px;
    min-width: 44px;
    min-height: 36px;
    padding: 7px 10px;
    border: 1px solid rgba(135, 131, 126, .55);
    color: var(--gray);
    background: rgba(255, 242, 220, .76);
    clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px,
                       100% calc(100% - 8px), calc(100% - 8px) 100%,
                       8px 100%, 0 calc(100% - 8px), 0 8px);
    font: 700 13px/1 "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    cursor: pointer;
  }
  .welcome-language-toggle:hover { color: #d88f00; }
  .welcome-language-toggle:focus-visible {
    outline: 3px solid rgba(62, 123, 250, .38);
    outline-offset: 3px;
  }
  .welcome-eyebrow {
    margin-bottom: 16px;
    color: var(--gray);
    font-size: clamp(12px, 2vmin, 15px);
    font-weight: 700;
    letter-spacing: .35em;
  }
  .welcome-title {
    color: var(--gray);
    font-size: clamp(32px, 7vmin, 62px);
    font-weight: 900;
    line-height: 1.15;
  }
  .welcome-title strong { color: var(--amber); }
  .welcome-copy {
    margin: 18px auto 28px;
    color: var(--gray);
    font-size: clamp(14px, 2.2vmin, 17px);
    line-height: 1.8;
  }
  #welcome-enter {
    min-width: 172px;
    padding: 14px 28px;
    border: 0;
    color: #765f41;
    background: var(--amber);
    clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px,
                       100% calc(100% - 10px), calc(100% - 10px) 100%,
                       10px 100%, 0 calc(100% - 10px), 0 10px);
    font: 800 16px/1 "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    letter-spacing: .12em;
    cursor: pointer;
    transition: transform .18s ease, filter .18s ease;
  }
  #welcome-enter:hover { filter: brightness(1.05); }
  #welcome-enter:active { transform: scale(.96); }
  #welcome-enter:focus-visible {
    outline: 3px solid rgba(62, 123, 250, .38);
    outline-offset: 4px;
  }

  /* 开始遮罩（首次点击解锁音频） */
  #overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 2.2vmin;
    align-items: center;
    justify-content: center;
    background: rgba(255, 242, 220, .9);
    transition: opacity .5s ease;
    cursor: pointer;
  }
  #overlay.hide { opacity: 0; pointer-events: none; }
  #overlay .title {
    font-size: clamp(34px, 8vmin, 72px);
    font-weight: 900;
    letter-spacing: .18em;
    color: var(--amber);
  }
  #overlay .title em { font-style: normal; color: var(--gray); }
  #overlay .sub {
    font-size: clamp(13px, 2.4vmin, 18px);
    letter-spacing: .5em;
    color: var(--gray);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .35; } }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="fx"></canvas>
    <a id="author-link" href="https://space.bilibili.com/357762853" aria-label="打开作者哔哩哔哩主页" data-i18n-aria-label="creatorPageLabel">
      <span class="author-copy" aria-hidden="true">
        <span class="author-label">Created by</span>
        <span class="author-name">MarkCup</span>
      </span>
    </a>
    <div id="zoneflash"></div>
    <div id="click-text-layer" aria-hidden="true"></div>

    <div id="milestone-video-layer" aria-hidden="true">
      <video
        id="milestone-video"
        src="media/click-20.mp4?v=20260723-bite-2"
        preload="auto"
        playsinline
        webkit-playsinline
      ></video>
    </div>

    <div id="dog">
      <div id="dog-inner">
        <div id="dog-jelly">
          <img id="dog-close" src="Image/dagou_close_mouth.png" alt="大狗" draggable="false" />
          <img id="dog-open" src="Image/dagou_open_mouth.png" alt="" draggable="false" />
        </div>
      </div>
    </div>

    <div id="top-controls" class="is-visible" aria-label="声音与导航控制" data-i18n-aria-label="controlsLabel">
      <div id="audio-controls" class="control-group">
        <button id="music-toggle" class="control-button" type="button" aria-label="关闭音乐" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 18V5l10-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="16" cy="16" r="3" />
            <path class="mute-slash" d="M4 3l16 18" />
          </svg>
          <span data-i18n="music">音乐</span>
        </button>
        <button id="sfx-toggle" class="control-button" type="button" aria-label="关闭音效" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 9v6h4l5 4V5L9 9H5z" />
            <path d="M17 9.5a4 4 0 010 5" />
            <path class="mute-slash" d="M4 3l16 18" />
          </svg>
          <span data-i18n="soundEffects">音效</span>
        </button>
      </div>
      <div class="control-group">
        <button id="language-toggle" class="control-button language-toggle" type="button" aria-label="切换为英文" title="切换为英文">
          <span class="language-label">EN</span>
        </button>
        <button id="github-button" class="control-button" type="button" aria-label="在 GitHub 查看项目" data-i18n-aria-label="githubButtonLabel">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 2a10 10 0 00-3.16 19.49c.5.09.68-.22.68-.48v-1.69c-2.78.61-3.37-1.18-3.37-1.18-.46-1.15-1.11-1.46-1.11-1.46-.91-.61.07-.6.07-.6 1 .07 1.53 1.01 1.53 1.01.9 1.51 2.35 1.08 2.92.83.09-.64.35-1.08.64-1.33-2.22-.25-4.56-1.1-4.56-4.89 0-1.08.39-1.96 1.03-2.65-.1-.25-.45-1.26.1-2.62 0 0 .84-.27 2.75 1.01A9.55 9.55 0 0112 6.8c.85 0 1.7.11 2.5.34 1.91-1.28 2.75-1.01 2.75-1.01.55 1.36.2 2.37.1 2.62.64.69 1.03 1.57 1.03 2.65 0 3.8-2.34 4.64-4.57 4.89.36.31.68.9.68 1.82v2.7c0 .27.18.58.69.48A10 10 0 0012 2z" />
          </svg>
          <span data-i18n="github">GitHub</span>
        </button>
        <button id="video-button" class="control-button" type="button" aria-label="打开哔哩哔哩视频 BV1kNKU6REBg" data-i18n-aria-label="featuredVideoLabel">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="3" />
            <path d="M10 9l5 3-5 3z" />
          </svg>
          <span data-i18n="video">视频</span>
        </button>
      </div>
    </div>

    <div id="overlay">
      <div class="title" data-i18n="gameTitle">大狗叫</div>
      <div class="sub" data-i18n="startPrompt">点 击 任 意 位 置 开 始</div>
    </div>

    <div id="welcome-ad" role="dialog" aria-modal="true" aria-labelledby="welcome-title">
      <div class="welcome-card">
        <button id="welcome-language-toggle" class="welcome-language-toggle language-toggle" type="button" aria-label="切换为英文" title="切换为英文">
          <span class="language-label">EN</span>
        </button>
        <div class="welcome-eyebrow" data-i18n="welcomeEyebrow">欢迎</div>
        <h1 id="welcome-title" class="welcome-title" data-i18n="welcomeTitle">打开创意</h1>
        <p class="welcome-copy" data-i18n="welcomeCopy">马上和大狗一起玩。</p>
        <button id="welcome-enter" type="button" data-i18n="enterGame">进入大狗叫</button>
      </div>
    </div>

  </div>

  <script>
    (() => {
      const translations = {
        zh: {
          pageTitle: '大狗叫',
          controlsLabel: '声音与导航控制',
          music: '音乐',

      const languageToggles = document.querySelectorAll('.language-toggle');
      let locale = 'zh';

      function getStoredLocale() {
        try {
          return window.localStorage.getItem('dagoujiao-locale');
        } catch (_) {
          return null;
        }
      }

      function t(key) {
        return translations[locale][key] || translations.zh[key] || key;
      }

      function applyLanguage(nextLocale) {
        locale = nextLocale === 'en' ? 'en' : 'zh';
        document.documentElement.lang = locale === 'zh' ? 'zh-CN' : 'en';
        document.title = t('pageTitle');
        document.querySelectorAll('[data-i18n]').forEach((element) => {
          element.textContent = t(element.dataset.i18n);
        });
        document.querySelectorAll('[data-i18n-aria-label]').forEach((element) => {
          element.setAttribute('aria-label', t(element.dataset.i18nAriaLabel));
        });
        document.getElementById('dog-close').alt = t('dogAlt');
        languageToggles.forEach((toggle) => {
          toggle.setAttribute('aria-label', t('switchLanguage'));
          toggle.title = t('switchLanguage');
          toggle.querySelector('.language-label').textContent = t('languageButton');
        });
        try {
          window.localStorage.setItem('dagoujiao-locale', locale);
        } catch (_) {
          // Language choice remains active for this page even when storage is unavailable.
        }
        document.dispatchEvent(new CustomEvent('dagou:languagechange'));
      }

      window.dagouI18n = {
        t,
        getLocale: () => locale,
      };

      const savedLocale = getStoredLocale();
      const browserLocale = navigator.language && navigator.language.toLowerCase().startsWith('zh') ? 'zh' : 'en';
      applyLanguage(savedLocale === 'en' || savedLocale === 'zh' ? savedLocale : browserLocale);
      languageToggles.forEach((toggle) => {
        toggle.addEventListener('click', () => {
          applyLanguage(locale === 'zh' ? 'en' : 'zh');
        });
      });
    })();

      event.stopPropagation();
      welcomeAd.classList.add('hide');
